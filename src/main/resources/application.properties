# === App & Server ===
spring.application.name=crewhive

server.port=${PORT:8080}

# === DataSource ===
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# === JPA / Hibernate ===
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Pool Hikari
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}

# === springdoc-openapi / swagger-ui ===
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.api-docs.path=/docs
springdoc.swagger-ui.path=/docs/ui

# === Actuator ===
management.endpoints.web.exposure.include=health,info

# === AWS Parameter Store ===
spring.config.import=aws-parameterstore:/crewhive/key/

# == Redis ==
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000
spring.data.redis.database=0
spring.cache.redis.time-to-live=600000
