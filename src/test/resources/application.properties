# Test-only configuration. This file is on the test classpath, so it fully replaces
# src/main/resources/application.properties for anything run under src/test (it is NOT merged
# with it) - keep it self-contained.
#
# The one thing this fixes: src/main's application.properties pulls jwt.privateKey/publicKey
# from AWS Parameter Store (spring.config.import=aws-parameterstore:...), which needs real AWS
# credentials and isn't reachable in a sandboxed/offline environment. Here we just point those
# same properties at a throwaway RSA keypair generated for tests only - never use it for
# anything real.
#
# Not fixed by this file: a context-loading test (e.g. HoursCalculatorApplicationTests) still
# needs a reachable Postgres on spring.datasource.url and a reachable Redis on localhost:6379,
# since the project has no embedded/in-memory alternative wired in yet.

spring.application.name=crewhive

# === DataSource (point at a local/dev Postgres you have running) ===
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/crewhive}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:test}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:test}

# === JPA / Hibernate ===
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# === Redis ===
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000
spring.data.redis.database=0
spring.cache.redis.time-to-live=600000

# === JWT keys (test-only throwaway keypair, replaces the AWS Parameter Store import) ===
jwt.privateKey=-----BEGIN PRIVATE KEY----------END PRIVATE KEY-----
jwt.publicKey=-----BEGIN PUBLIC KEY----------END PUBLIC KEY-----
